<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Page not found | MyJay.net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@1,300&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="torn-header compact">
    <div class="logo">
      <img src="/assets/img/logo.png" alt="MyJay.net" onerror="var s=this.nextElementSibling; this.remove(); s.style.display=''">
      <span class="logo-fallback" style="display:none"><span class="myjay">MyJay</span><span class="dotnet">.net</span></span>
    </div>
  </header>

  <main class="wrapper center">
    <section>
      <h1><em>404</em></h1>
      <p class="text-muted">
        This page doesn't exist. It may have been moved, renamed, or never existed in the first place.
      </p>

      <img src="/assets/img/MyJayErrorMascot.png" alt="" class="mascot" onerror="this.style.display='none'">

      <a class="btn btn-ghost" href="/">Back to MyJay.net</a>
    </section>
  </main>

  <footer class="footer">
    <span class="footnote">[1] If you typed this URL by hand, double-check the spelling.</span>
    <span class="footnote">[2] v0.1.0-alpha, independently run.</span>
  </footer>

  <script type="module" src="/assets/main.js"></script>
</body>
</html>
