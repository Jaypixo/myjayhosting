<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in | MyJay.net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@1,300&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="torn-header compact">
    <div class="nav-auth" data-nav-auth>
      <a href="/register.html" class="btn btn-sm">Register</a>
    </div>
    <div class="logo">
      <img src="/assets/img/logo.png" alt="MyJay.net" onerror="var s=this.nextElementSibling; this.remove(); s.style.display=''">
      <span class="logo-fallback" style="display:none"><span class="myjay">MyJay</span><span class="dotnet">.net</span></span>
    </div>
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/explore.html">Explore</a>
      <a href="/help.html">Help</a>
      <a href="/about.html">About</a>
      <a href="/contact.html">Contact</a>
    </nav>
  </header>

  <main class="wrapper">
    <section class="auth-section">
      <h1>Welcome back.</h1>
      <p class="text-muted">Log in to manage your site.</p>

      <div class="card">
        <form id="login-form">
          <div class="form-error" id="form-error"></div>

          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email" required>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
          </div>

          <button type="submit" class="btn" id="submit-btn">Log in →</button>
        </form>
      </div>

      <p class="mt-1 text-muted">No account yet? <a href="/register.html">Claim your subdomain</a>.</p>
    </section>
  </main>

  <footer class="footer">
    <span class="footnote">[1] Sessions last 30 days. Cookies are HttpOnly and Secure.</span>
    <span class="footnote">[2] v0.1.0-alpha, built on Cloudflare Pages, Workers, D1, R2, KV.</span>
    <span class="footnote">[3] <a href="/status.html">Status</a> · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></span>
  </footer>

  <script type="module" src="/assets/main.js"></script>
  <script type="module">
    import { apiFetch } from '/assets/main.js';

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('form-error');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';

      try {
        const res = await apiFetch('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error || 'Invalid email or password.';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Log in →';
          return;
        }
        window.location.href = '/dashboard.html';
      } catch {
        errorEl.textContent = 'Network error. Please try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log in →';
      }
    });
  </script>
</body>
</html>
