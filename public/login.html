<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in | MyJay.net</title>
  <meta name="description" content="Log in to your MyJay account to manage your files and publish your site.">
  <link rel="canonical" href="https://myjay.net/login">
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@1,300&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="torn-header compact">
    <div class="nav-auth" data-nav-auth>
      <a href="/register" class="btn btn-sm">Register</a>
    </div>
    <div class="logo">
      <img src="/assets/img/logo.png" alt="MyJay.net" onerror="var s=this.nextElementSibling; this.remove(); s.style.display=''">
      <span class="logo-fallback" style="display:none"><span class="myjay">MyJay</span><span class="dotnet">.net</span></span>
    </div>
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/search">Search</a>
      <a href="/docs">Docs</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
    </nav>
  </header>

  <main class="wrapper">
    <section class="auth-section">
      <h1>Welcome back.</h1>
      <p class="text-muted">Log in to manage your site.</p>

      <div class="card">
        <form id="login-form" novalidate>
          <div class="form-error" id="form-error"></div>

          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email" required>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
            <p class="field-hint"><a href="#" id="forgot-password-link">Forgot your password?</a></p>
          </div>

          <button type="submit" class="btn" id="submit-btn">Log in →</button>
          <button type="button" class="btn btn-ghost mt-1 hidden" id="resend-verification-btn" style="width:100%">Resend verification email</button>
        </form>
      </div>

      <p class="mt-1 text-muted">No account yet? <a href="/register">Claim your subdomain</a>.</p>
    </section>
  </main>

  <footer class="footer">
    <span class="footnote">[1] Sessions last 30 days. Cookies are HttpOnly and Secure.</span>
    <span class="footnote">[2] v0.1.0-alpha, independently run.</span>
    <span class="footnote">[3] <a href="/status">Status</a> · <a href="/privacy">Privacy</a> · <a href="/terms">Terms</a></span>
  </footer>

  <script type="module" src="/assets/main.js"></script>
  <script type="module">
    import { apiFetch, setFieldError, clearFieldError, clearFormErrors, showAlert, showPrompt } from '/assets/main.js';

    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('form-error');
    const submitBtn = document.getElementById('submit-btn');
    const resendBtn = document.getElementById('resend-verification-btn');

    const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    function validate() {
      clearFormErrors(form);
      let firstInvalid = null;

      const email = emailInput.value.trim();
      if (!email) {
        setFieldError(emailInput, 'Enter your email address.');
        firstInvalid = firstInvalid || emailInput;
      } else if (!EMAIL_RE.test(email)) {
        setFieldError(emailInput, 'That doesn\'t look like a valid email address.');
        firstInvalid = firstInvalid || emailInput;
      }

      if (!passwordInput.value) {
        setFieldError(passwordInput, 'Enter your password.');
        firstInvalid = firstInvalid || passwordInput;
      }

      if (firstInvalid) firstInvalid.focus();
      return !firstInvalid;
    }

    [emailInput, passwordInput].forEach((input) => {
      input.addEventListener('input', () => clearFieldError(input));
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      resendBtn.classList.add('hidden');
      if (!validate()) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';

      try {
        const res = await apiFetch('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: emailInput.value.trim(),
            password: passwordInput.value,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          // Deliberately generic, never reveal which of email/password is wrong.
          errorEl.textContent = data.error || 'Invalid email or password.';
          if (data.unverified) resendBtn.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Log in →';
          return;
        }
        window.location.href = '/dashboard';
      } catch {
        errorEl.textContent = 'Network error. Please try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log in →';
      }
    });

    resendBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      if (!email) {
        setFieldError(emailInput, 'Enter your email address first.');
        emailInput.focus();
        return;
      }
      resendBtn.disabled = true;
      try {
        await apiFetch('/api/auth/resend-verification', {
          method: 'POST',
          body: JSON.stringify({ email }),
        });
        await showAlert('If that account needs verifying, a new link is on its way.', { title: 'Check your email' });
      } finally {
        resendBtn.disabled = false;
      }
    });

    document.getElementById('forgot-password-link').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = await showPrompt('Enter your account email and we\'ll send a reset link.', {
        title: 'Reset your password',
        placeholder: 'you@example.com',
        defaultValue: emailInput.value.trim(),
      });
      if (!email) return;
      await apiFetch('/api/auth/request-reset', {
        method: 'POST',
        body: JSON.stringify({ email }),
      });
      await showAlert('If that email has an account, a reset link is on its way.', { title: 'Check your email' });
    });
  </script>
</body>
</html>
